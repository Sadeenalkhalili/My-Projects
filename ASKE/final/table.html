 transition:0.3s all linear;

body{
margin:0;
padding:0;
}

.rating {
position:absolute;
top:60%;
left:70%;
transform:translate(-50%,-50%) rotateY(180deg);
display:flex;
}

.rating input{
display:none;

}

.rating label{
display:block;
cursor:pointer;
width:35px;


}

.rating label:before{

content:'\f005';
font-family:fontAwesome;
position:relative;
display:block;
font-size:50px;
color:#101010;
}

.rating label:after{

content:'\f005';
font-family:fontAwesome;
position:absolute;
display:block;
font-size:50px;
color:#00bfff;
top:0;
opacity:0;
transition:.5s;
text-shadow:0 2px 5px rgba(0,0,0,.5);
}

.rating label:hover:after,
.rating label:hover ~ label:after,
.rating input:checked ~ label:after{
opacity:1;

}


.box{
position:relative;
background :linear-gradient(145deg,#383838,#003366);

}

.box .rating{

 position:absolute;
